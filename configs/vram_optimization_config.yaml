# VRAM Optimization Configuration

## Low VRAM (<=4GB)
- Use 4-bit quantized models (.safetensors)
- Enable model offloading
- Use tile-based processing
- Prioritize memory-efficient workflows

## Standard VRAM (8-16GB)
- Use 8-bit quantized models (.safetensors)
- Enable partial offloading
- Use optimized checkpoint saving
- Enable VRAM-aware memory management

## High VRAM (>16GB)
- Use full-precision models (.ckpt/.pth)
- Disable aggressive offloading
- Enable high-resolution processing
- Use advanced memory profiling tools

## General Settings
- Enable progress tracking for memory usage
- Set VRAM warning thresholds
- Configure auto-scaling based on available memory
- Enable smart memory cleanup after each workflow